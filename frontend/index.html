<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banking Console System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Banking Console System</h1>
    <p>Manage accounts easily</p>
  </header>

  <main>

    <!-- Create Account -->
    <section class="card">
      <h2>Create Account</h2>
      <input id="create-name"    placeholder="Full Name" />
      <input id="create-deposit" type="number" placeholder="Initial Deposit (Rs.)" />
      <select id="create-type">
        <option value="savings">Savings</option>
        <option value="current">Current</option>
      </select>
      <button onclick="createAccount()">Create Account</button>
      <p class="msg" id="create-msg"></p>
    </section>

    <!-- Deposit -->
    <section class="card">
      <h2>Deposit Money</h2>
      <input id="dep-acc" placeholder="Account Number (e.g. ACC1001)" />
      <input id="dep-amt" type="number" placeholder="Amount (Rs.)" />
      <button onclick="deposit()">Deposit</button>
      <p class="msg" id="dep-msg"></p>
    </section>

    <!-- Withdraw -->
    <section class="card">
      <h2>Withdraw Money</h2>
      <input id="wit-acc" placeholder="Account Number" />
      <input id="wit-amt" type="number" placeholder="Amount (Rs.)" />
      <button onclick="withdraw()">Withdraw</button>
      <p class="msg" id="wit-msg"></p>
    </section>

    <!-- Transfer -->
    <section class="card">
      <h2>Transfer Money</h2>
      <input id="trans-from" placeholder="From Account Number" />
      <input id="trans-to"   placeholder="To Account Number" />
      <input id="trans-amt"  type="number" placeholder="Amount (Rs.)" />
      <button onclick="transfer()">Transfer</button>
      <p class="msg" id="trans-msg"></p>
    </section>

    <!-- Check Balance -->
    <section class="card">
      <h2>Check Balance</h2>
      <input id="bal-acc" placeholder="Account Number" />
      <button onclick="checkBalance()">Check Balance</button>
      <p class="msg" id="bal-msg"></p>
    </section>

    <!-- All Accounts -->
    <section class="card">
      <h2>All Accounts</h2>
      <button onclick="loadAccounts()">Refresh List</button>
      <div id="accounts-list"><p>Click Refresh to load accounts.</p></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
